<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElactreeBot - AI Sales Assistant</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floating Circular Launcher Button -->
    <button id="chat-launcher" class="chat-launcher" aria-label="Open Chat">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
    </button>

    <!-- Floating Chat Widget Container -->
    <div id="chat-container" class="chat-container hidden">
        
        <!-- Header with Avatar and Online Status -->
        <div class="chat-header">
            <div class="header-info">
                <div class="header-title-row">
                    <h2>ElactreeBot</h2>
                    <span class="status-indicator" title="Online"></span>
                </div>
                <span class="header-subtitle">Sales & Support Assistant</span>
            </div>
            <button id="close-chat" class="close-btn" aria-label="Close Chat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <!-- Chat History -->
        <div id="chat-box" class="chat-box"></div>

        <!-- Input Area -->
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Ask about our products..." autocomplete="off">
            <button id="send-btn" aria-label="Send Message">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
